<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sideline Manager icon">
  <defs>
    <linearGradient id="appRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1575B"/>
      <stop offset="100%" stop-color="#E0464B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7f1d1d" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- rounded square background -->
  <rect x="26" y="26" width="460" height="460" rx="104" fill="url(#appRed)"/>

  <g filter="url(#shadow)">
    <!-- clipboard -->
    <g>
      <rect x="146" y="96" width="220" height="308" rx="34" fill="#FFFFFF" stroke="#0B2347" stroke-width="14"/>
      <rect x="198" y="72" width="116" height="62" rx="20" fill="#0B2347"/>
      <circle cx="256" cy="102" r="13" fill="#FFFFFF"/>

      <!-- clipboard lines -->
      <circle cx="192" cy="182" r="10" fill="#6B7280"/>
      <circle cx="192" cy="232" r="10" fill="#6B7280"/>
      <circle cx="192" cy="282" r="10" fill="#6B7280"/>

      <rect x="220" y="172" width="94" height="14" rx="7" fill="#4B5563"/>
      <rect x="220" y="222" width="122" height="14" rx="7" fill="#4B5563"/>
      <rect x="220" y="272" width="112" height="14" rx="7" fill="#4B5563"/>
    </g>

    <!-- left navy interchange arrow -->
    <path d="M125 330c-18-24-29-52-29-84 0-40 18-78 49-106" fill="none" stroke="#0B2347" stroke-width="24" stroke-linecap="round"/>
    <path d="M110 166l47-4-20 41Z" fill="#0B2347"/>

    <!-- right red interchange arrow -->
    <path d="M360 154c34 22 56 60 56 102 0 35-14 67-37 91" fill="none" stroke="#D92F35" stroke-width="24" stroke-linecap="round"/>
    <path d="M402 339l-46 10 8-45Z" fill="#D92F35"/>

    <!-- rugby ball -->
    <g transform="translate(175 286) rotate(-18 82 52)">
      <ellipse cx="82" cy="52" rx="78" ry="48" fill="#FFFFFF" stroke="#0B2347" stroke-width="10"/>
      <path d="M36 52c13-12 29-18 46-18s33 6 46 18c-13 12-29 18-46 18s-33-6-46-18Z" fill="#F8FAFC" stroke="#0B2347" stroke-width="6"/>
      <path d="M65 34l8 18m27-18-8 18m-14 0v30m16-30v30" stroke="#0B2347" stroke-width="5" stroke-linecap="round"/>
      <path d="M18 52c15 16 34 27 54 33" fill="none" stroke="#D92F35" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>
</svg>
